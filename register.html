<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Register - MedRep</title>
    <link rel="stylesheet" href="register.css" />
</head>
<body>
    <div id="register-container">

        <h1>Create Your Account</h1>
        <p>Start managing your medical reports securely.</p>
        
        <form id="register-form">

            <label for="name"><b>Full Name</b></label>
            <input type="text" placeholder="Enter Your Full Name" name="name" id="name" autocomplete="name" required>

            <label for="email"><b>Email</b></label>
            <input type="email" placeholder="you@example.com" name="email" id="email" autocomplete="name" required>
        
            <label for="password"><b>Password</b></label>
            <input type="password" placeholder="Enter Your Password" name="password" id="password" autocomplete="name" required>

            <button id="SignupBtn">Sign Up</button>

        </form>

        <P>Already have an account? <a href="/login.html">Sign in</a></P>

    </div>

    <script src="register.js"></script>
</body>
</html>
