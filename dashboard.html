<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediScan - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f0e;
            --surface: #141714;
            --card: #1a1d1a;
            --border: #2a2e2a;
            --green: #4ade80;
            --green-dim: #22c55e33;
            --text: #e8ede8;
            --muted: #7a8a7a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.2rem 0.8rem;
            overflow: hidden;
            transition: width 0.3s ease, padding 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar.closed {
            width: 0;
            padding: 1.2rem 0;
        }

        /* TOP ROW inside sidebar */
        .sidebar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            white-space: nowrap;
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 1.4rem;
            color: var(--green);
            letter-spacing: -0.02em;
        }
        .logo span { color: var(--text); }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .toggle-btn:hover { color: var(--text); background: var(--card); }

        .btn-upload {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--green-dim);
            border: 1px solid rgba(74,222,128,0.2);
            color: var(--green);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 1.5rem;
            white-space: nowrap;
        }
        .btn-upload:hover { background: rgba(74,222,128,0.12); }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 0.4rem;
            margin-bottom: 0.5rem;
            white-space: nowrap;
        }

        .reports-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .reports-list::-webkit-scrollbar { width: 4px; }
        .reports-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .report-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.55rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .report-item:hover { background: var(--card); }

        .report-item-name {
            font-size: 0.85rem;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .empty-sidebar {
            font-size: 0.8rem;
            color: var(--muted);
            padding: 0.8rem;
            line-height: 1.6;
            white-space: normal;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            white-space: nowrap;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--green);
            color: #0d0f0e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .user-name { font-size: 0.85rem; font-weight: 500; }
        .user-plan { font-size: 0.72rem; color: var(--muted); }

        /* MAIN */
        .main {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }

        /* Toggle button when sidebar is closed */
        .open-btn {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 200;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.4rem 0.7rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .open-btn:hover { background: var(--card); }
        .open-btn.visible { display: block; }

        .welcome {
            text-align: center;
            max-width: 480px;
        }
        .welcome h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        .welcome h1 em { font-style: italic; color: var(--green); }
        .welcome p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn-primary {
            background: var(--green);
            color: #0d0f0e;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }

        .hidden { display: none; }

        /* CHAT AREA */
        #chatArea {
            width: 100%;
            max-width: 720px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        #chatMessages::-webkit-scrollbar { width: 4px; }
        #chatMessages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        #chatMessages div {
            padding: 1rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.7;
            max-width: 85%;
        }

        #chatMessages div:has(strong:first-child) {
            background: var(--card);
            border: 1px solid var(--border);
            align-self: flex-start;
}

        /* chat input row */
        .chat-input-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
        }

        #chatInput {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.8rem 1.2rem;
            border-radius: 100px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        #chatInput:focus {
            outline: none;
            border-color: var(--green);
        }

        #sendBtn {
            background: var(--green);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        #sendBtn:hover { opacity: 0.85; transform: translateY(-1px); }

        /* delete button */
        #deleteBtn {
            background: none;
            border: 1px solid #ef444433;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        #deleteBtn:hover { background: #ef444415; }

        /* analyze button */
        #submitBtn {
            background: var(--green);
            color: #0d0f0e;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.2s, transform 0.2s;
        }

        #submitBtn:hover { opacity: 0.85; transform: translateY(-1px); }
        #submitBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="logo">Medi<span>Scan</span></div>
            <button class="toggle-btn" id="closeBtn">✕</button>
        </div>

        <button class="btn-upload" id="uploadbtn">+ Upload Report</button>

        <div class="sidebar-label">Recent Reports</div>

        <div class="reports-list" id="reportsList">
            <div class="empty-sidebar">No reports yet. Upload your first medical report.</div>
        </div>

        <div class="sidebar-footer">
            <div class="avatar">B</div>
            <div>
                <div class="user-name" id="userName">Batman</div>
                <div class="user-plan">Free plan</div>
            </div>
        </div>
    </div>

    <!-- Open button (shows when sidebar is closed) -->
    <button class="open-btn" id="openBtn">☰</button>

    <!-- Main -->
    <div class="main">
        <div class="welcome">
            <h1>Your medical reports,<br/><em>explained simply</em></h1>
            <p>Upload a medical report to get an AI-powered summary and ask questions about your health values.</p>
            <button class="btn-primary" id="uploadbtn2">+ Upload Your First Report</button>
        </div>

        <div class="upload">
            <input type="file" id="fileInput" accept=".pdf" style="display:none"/>
            <button id="submitBtn" class="hidden">Analyze Report</button>
        </div>
        <div id="chatArea" class="hidden">
            <div id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Ask about this report..."/>
                <button id="sendBtn">
                    <svg width="16" height="16" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                    </svg>
                </button>
                <button id="deleteBtn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                    </svg>
                </button>
            </div>
        </div>
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>   
        document.addEventListener("DOMContentLoaded", () => {

        
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }
        
        async function authFetch(url, options = {}) {
            let currentToken = localStorage.getItem("token");

            const response = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    "Authorization": `Bearer ${currentToken}`
                }
            });

            if (response.status === 401 || response.status === 403) {
                const refreshToken = localStorage.getItem("refresh_token");

                const res = await fetch("http://127.0.0.1:8000/refresh", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({"refresh_token": refreshToken})
                });

                const data = await res.json();

                if (!res.ok) {
                    localStorage.removeItem("token");
                    localStorage.removeItem("refresh_token");
                    window.location.href = "login.html";
                    return;
                }

                localStorage.setItem("token", data.access_token);

                return fetch(url, {
                    ...options,
                    headers: {
                        ...options.headers,
                        "Authorization": `Bearer ${data.access_token}`
                    }
                });
            }
            return response;
        }

        const sidebar = document.getElementById("sidebar")
        const closeBtn = document.getElementById("closeBtn")
        const openBtn = document.getElementById("openBtn")
        const submitBtn = document.getElementById("submitBtn")
        const upload = document.querySelector(".upload")
        const chatArea = document.getElementById("chatArea")
        const fileInput = document.getElementById("fileInput")
        const chatMessages = document.getElementById("chatMessages")

        let currentFileId = null;

        closeBtn.addEventListener("click", () => {
            sidebar.classList.add("closed")
            openBtn.classList.add("visible")
        })

        openBtn.addEventListener("click", () => {
            sidebar.classList.remove("closed")
            openBtn.classList.remove("visible")
        })

        document.getElementById("uploadbtn").addEventListener("click", () => {
            document.getElementById("fileInput").click()
        })

        document.getElementById("uploadbtn2").addEventListener("click", () => {
            document.getElementById("fileInput").click()
        })

        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];

            if (file && file.type !== "application/pdf") {
                alert("Only PDF files are allowed");
                fileInput.value = "";
                return;
            }

            upload.classList.remove("hidden")
            submitBtn.classList.remove("hidden")
        })

        submitBtn.addEventListener("click", async() => {
            const file = fileInput.files[0];
            

            const formData = new FormData();
            formData.append("file", file);

            submitBtn.textContent = "Analyzing..."
            submitBtn.disabled = true;

            try {
                const response = await authFetch("http://127.0.0.1:8000/summarize/document", {
                    method: "POST",
                    body: formData

                });

                const data = await response.json()
                console.log(data);
                console.log(response.ok);
                console.log(response.status);

                if (!response.ok) {
                    alert(data.detail || "Upload failed");
                    return;
                }
                const item = document.createElement("div");
                item.classList.add('report-item');
                item.innerHTML = `<span class="report-item-name">${fileInput.files[0].name}</span>`;
                currentFileId = data.file_id;
                item.dataset.fileId = data.file_id;
                item.addEventListener("click", () => loadFile(data.file_id));
                document.getElementById("reportsList").appendChild(item);

                upload.classList.add("hidden")
                submitBtn.classList.add("hidden")
                chatArea.classList.remove("hidden")
                document.querySelector(".welcome").classList.add("hidden")

                chatMessages.innerHTML = `<div><strong>Summary:</strong><br/>${marked.parse(data.summary) || "No summary returned "}</div>`;

            } catch (error) {
                alert("Could not connect to server");
                console.error(error);
            } finally {
                submitBtn.textContent = "Analyze Report ->";
                submitBtn.disabled = false;
            }

        });

        authFetch("http://127.0.0.1:8000/my/files")
        .then(res => res.json())
        .then(data => {
            const reportsList = document.getElementById("reportsList");

            if (!Array.isArray(data)) return;

            reportsList.innerHTML = "";

            data.forEach(file => {
                const item = document.createElement("div");
                item.classList.add("report-item");
                item.dataset.fileId = file.id;
                item.innerHTML =`<span class="report-item-name">${file.filename}</span>`;
                item.addEventListener("click", () => loadFile(file.id));
                reportsList.appendChild(item);
            });

            if (data.length > 0) {
                document.querySelector(".welcome").classList.add("hidden");
                document.getElementById("chatArea").classList.remove("hidden");

                loadFile(data[0].id);
            }
        });

        async function loadFile(fileId) {
            currentFileId = fileId;
            
            document.querySelector(".welcome").classList.add("hidden");
            upload.classList.add("hidden");
            submitBtn.classList.add("hidden");
            chatArea.classList.remove("hidden");

            const response = await authFetch(`http://127.0.0.1:8000/chat/history/${fileId}`);
            const data = await response.json();

            chatMessages.innerHTML = "";

            if (Array.isArray(data) && data.length > 0) {
                data.forEach(msg => {
                    chatMessages.innerHTML += `<div><strong>${msg.role === "user" ? "You": "AI"}:</strong> ${marked.parse(msg.content)}</div>`;     
                });
            } else{
                const summaryRes = await authFetch(
                    
                `http://127.0.0.1:8000/files/${fileId}`
                );

                const fileData = await summaryRes.json();

                chatMessages.innerHTML = 
                `<div><strong>Summary:</strong><br/>${marked.parse(fileData.summary)}</div>`;
            }

        }
        const sendBtn = document.getElementById("sendBtn");

        sendBtn.addEventListener("click", async() => {
            const question = document.getElementById("chatInput").value.trim()

            if (!question || !currentFileId) return;

            chatMessages.innerHTML += `<div><strong>You:</strong> ${question}</div>`;
            document.getElementById("chatInput").value = "";

            const response = await authFetch("http://127.0.0.1:8000/ask/document", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({question: question,file_id: currentFileId})
            });

            const data = await response.text();
            chatMessages.innerHTML += `<div><strong>AI:</strong> ${marked.parse(data)}</div>`;   
        });

        document.getElementById("chatInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendBtn.click();
        });

        const deleteBtn = document.getElementById("deleteBtn");

        deleteBtn.addEventListener("click", async() => {
            const confirm = window.confirm("Are you sure you want to delete this report?");
            if (!confirm) return;

            const response = await authFetch(`http://127.0.0.1:8000/delete/files?file_id=${currentFileId}`, {
                method: "DELETE",
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.detail || "Delete failed");
                return;
            }

            alert("Report deleted successfully");

            const itemToRemove = document.querySelector(`[data-file-id="${currentFileId}"]`);
            if (itemToRemove) itemToRemove.remove();

            chatArea.classList.add("hidden");
            document.querySelector(".welcome").classList.remove("hidden");
            currentFileId = null;
        });
    });
   </script>

</body>
</html>
