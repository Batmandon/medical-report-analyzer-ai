<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Login - MedRep</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div id="login-container">

        <h1>Get Started</h1>
        <p>Start managing your medical reports securely.</p>
        
        <form id="login-form">

            <label for="email"><b>Email</b></label>
            <input type="email" placeholder="you@example.com" name="email" id="email" autocomplete="name" required>
        
            <label for="password"><b>Password</b></label>
            <input type="password" placeholder="Enter Your Password" name="password" id="password" autocomplete="name" required>

            <button id="SigninBtn">Sign In</button>

        </form>

        <P>Don't have an account? <a href="/register.html">Sign up</a></P>

    </div>
    <script src="login.js"></script>
</body>
</html>
