<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediScan - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0f0e;
            --surface: #141714;
            --card: #1a1d1a;
            --border: #2a2e2a;
            --green: #4ade80;
            --green-dim: #22c55e33;
            --text: #e8ede8;
            --muted: #7a8a7a;
            --accent: #a3e635;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* Glow behind card */
        body::after {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,222,128,0.07) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 440px;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Green top line on card */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            border-radius: 20px 20px 0 0;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }

        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 1.4rem;
            color: var(--green);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .logo span { color: var(--text); }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.8rem;
        }

        label {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 400;
            margin-top: 0.6rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.8rem 1rem;
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--green);
        }

        input[type="submit"] {
            width: 100%;
            background: var(--green);
            color: #0d0f0e;
            border: none;
            padding: 0.85rem 1rem;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 0.8rem;
            transition: opacity 0.2s, transform 0.2s;
        }

        input[type="submit"]:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        button {
            width: 100%;
            background: var(--green);
            color: #0d0f0e;
            border: none;
            padding: 0.85rem 1rem;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 0.8rem;
            transition: opacity 0.2s, transform 0.2s;
        }

        button:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .footer-link {
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        .footer-link a {
            color: var(--green);
            text-decoration: none;
        }
        .footer-link a:hover { text-decoration: underline; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Medi<span>Scan</span></div>
        <h1>Welcome back</h1>

        <label for="useremail">Email</label>
        <input type="text" id="useremail" name="useremail" placeholder="you@example.com"/>

        <label for="pass">Password</label>
        <input type="password" id="pass" name="password" minlength="8" required placeholder="••••••••"/>

        <button id ="loginBtn">Sign in</button>

        <div class="footer-link">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

    <script>

        const loginBtn = document.getElementById("loginBtn")
        loginBtn.addEventListener("click", () => {

            const email = document.getElementById("useremail").value
            const password = document.getElementById("pass").value

            fetch("http://127.0.0.1:8000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                "email": email,
                "password": password
            })
            })
            .then(function(response) {return response.json();})
            .then(function(data) {

                if (!data.access_token) {
                    alert(data.detail || "Login failed");
                    return;
                }
                console.log(data)
                localStorage.setItem("token", data.access_token)
                localStorage.setItem("refresh_token", data.refresh_token)
                window.location.href="dashboard.html"
                console.log("token")
        });

        });  
    </script>
</body>
</html>
